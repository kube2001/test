<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計算ツール</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Meiryo", sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
            color: #222;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* タブ */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #d9e4f2;
            flex-wrap: wrap;
        }

        .tab-button {
            width: auto;
            padding: 12px 22px;
            font-size: 16px;
            font-weight: bold;
            background: #e9eef5;
            color: #1f3f66;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
        }

        .tab-button:hover {
            background: #dce8f7;
        }

        .tab-button.active {
            background: #1f6feb;
            color: #fff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .blank-page {
            min-height: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 20px;
            color: #1f3f66;
            border-bottom: 2px solid #d9e4f2;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #fff;
        }

        input[readonly] {
            background: #f0f0f0;
        }

        .unit {
            font-size: 14px;
            color: #555;
            margin-top: 4px;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .radio-card {
            flex: 1;
            min-width: 120px;
        }

        .radio-card input {
            display: none;
        }

        .radio-card span {
            display: block;
            text-align: center;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            background: #fafafa;
            font-weight: bold;
        }

        .radio-card input:checked + span {
            background: #1f6feb;
            color: #fff;
            border-color: #1f6feb;
        }

        .calc-button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            background: #1f6feb;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .calc-button:hover {
            background: #185abc;
        }

        .result-placeholder {
            color: #777;
            text-align: center;
            padding: 40px 10px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .result-box {
            background: #f8fbff;
            border: 1px solid #d8e6f7;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .result-box.highlight {
            background: #eaf3ff;
            border-color: #1f6feb;
        }

        .result-label {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 26px;
            font-weight: bold;
            color: #1f3f66;
        }

        .unit-count-card {
            background: #f3fbf4;
            border: 1px solid #b9dfbd;
            border-left: 6px solid #2e7d32;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 18px;
        }

        .unit-count-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            color: #1f5f25;
        }

        .unit-count-main {
            font-size: 24px;
            font-weight: bold;
            color: #1f5f25;
            margin-bottom: 6px;
        }

        .unit-count-detail {
            font-size: 15px;
            color: #333;
            line-height: 1.6;
        }

        .equipment-section {
            margin-top: 15px;
        }

        .equipment-card {
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 6px solid #1f6feb;
            background: #f9fbff;
        }

        .equipment-card.reactor {
            border-left-color: #ff9800;
            background: #fffaf2;
        }

        .equipment-card.summary {
            border-left-color: #2e7d32;
            background: #f3fbf4;
        }

        .equipment-card.warning {
            border-left-color: #f57c00;
            background: #fff8ec;
        }

        .equipment-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .equipment-detail {
            font-size: 16px;
            line-height: 1.7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            background: #fff;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 9px;
            text-align: center;
        }

        th {
            background: #f0f4f8;
        }

        .note {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .formula-section {
            margin-top: 22px;
            font-size: 13px;
            color: #555;
        }

        .formula-title {
            font-weight: bold;
            color: #777;
            margin-bottom: 6px;
        }

        .formula-box {
            background: #fafafa;
            border: 1px dashed #ccc;
            border-radius: 8px;
            padding: 12px 14px;
            line-height: 1.7;
            color: #555;
        }

        .formula-main {
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
            font-weight: bold;
        }

        .checkbox-row input {
            margin-top: 4px;
        }

        .grounding-ref-section {
            margin-top: 20px;
        }

        .grounding-ref-section h3 {
            margin-bottom: 8px;
            color: #1f3f66;
            font-size: 17px;
        }

        @media (max-width: 950px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .tab-button {
                flex: 1;
                padding: 12px 8px;
                font-size: 14px;
            }
        }
    </style>

    <script>
        function showTab(tabId) {
            const contents = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-button');

            contents.forEach(content => {
                content.classList.remove('active');
            });

            buttons.forEach(button => {
                button.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
        }

        const capacitanceValues = {
            '14sq': 0.24,
            '22sq': 0.27,
            '38sq': 0.32,
            '60sq': 0.37,
            '100sq': 0.45,
            '150sq': 0.52,
            '200sq': 0.51,
            '250sq': 0.55,
            '325sq': 0.61,
            '400sq': 0.68,
            '500sq': 0.74,
            '600sq': 0.71
        };

        const reactorRatings = {
            r1: { name: '1Kリアクトル', current: 128 },
            r2: { name: '2Kリアクトル', current: 165 },
            r5: { name: '5Kリアクトル', current: 412 }
        };

        function updateCapacitance() {
            const cableSize = document.getElementById('cableSize').value;
            document.getElementById('capacitance').value = capacitanceValues[cableSize] || '';
        }

        function getSelectedTransformer() {
            const transformerOption = document.querySelector('input[name="transformer"]:checked').value;

            if (transformerOption === '2K') {
                return {
                    name: '2Kトランス',
                    current: 165
                };
            } else {
                return {
                    name: '5Kトランス',
                    current: 412
                };
            }
        }

        function findBestEquipment(requiredCurrent, transformer) {
            let best = null;

            const remainingAfterTransformer = Math.max(0, requiredCurrent - transformer.current);

            const maxR1 = Math.ceil(remainingAfterTransformer / reactorRatings.r1.current) + 5;
            const maxR2 = Math.ceil(remainingAfterTransformer / reactorRatings.r2.current) + 5;
            const maxR5 = Math.ceil(remainingAfterTransformer / reactorRatings.r5.current) + 5;

            for (let r1 = 0; r1 <= maxR1; r1++) {
                for (let r2 = 0; r2 <= maxR2; r2++) {
                    for (let r5 = 0; r5 <= maxR5; r5++) {

                        const reactorTotal =
                            r1 * reactorRatings.r1.current +
                            r2 * reactorRatings.r2.current +
                            r5 * reactorRatings.r5.current;

                        const totalCapacity = transformer.current + reactorTotal;

                        if (totalCapacity >= requiredCurrent) {
                            const margin = totalCapacity - requiredCurrent;
                            const reactorCount = r1 + r2 + r5;
                            const totalUnitCount = 1 + reactorCount;

                            const candidate = {
                                transformer: transformer,
                                reactors: {
                                    r1: r1,
                                    r2: r2,
                                    r5: r5
                                },
                                reactorTotal: reactorTotal,
                                totalCapacity: totalCapacity,
                                margin: margin,
                                reactorCount: reactorCount,
                                totalUnitCount: totalUnitCount
                            };

                            if (
                                best === null ||
                                candidate.reactorCount < best.reactorCount ||
                                (
                                    candidate.reactorCount === best.reactorCount &&
                                    candidate.margin < best.margin
                                )
                            ) {
                                best = candidate;
                            }
                        }
                    }
                }
            }

            return best;
        }

        function calculateChargingCurrent() {
            const cableSize = document.getElementById('cableSize').value;
            const capacitance = parseFloat(document.getElementById('capacitance').value);
            const lengthInput = parseFloat(document.getElementById('length').value);
            const frequency = parseFloat(document.getElementById('frequency').value);

            if (!cableSize || isNaN(capacitance)) {
                alert('ケーブルサイズを選択してください。');
                return;
            }

            if (isNaN(lengthInput) || lengthInput <= 0) {
                alert('ケーブル長を正しく入力してください。');
                return;
            }

            if (isNaN(frequency) || frequency <= 0) {
                alert('周波数を正しく入力してください。');
                return;
            }

            const lengthKm = lengthInput / 1000;

            const voltageOption = document.querySelector('input[name="voltage"]:checked').value;
            const voltage = voltageOption === '6.6kV' ? 10350 : 5175;

            const selectedTransformer = getSelectedTransformer();

            const C = capacitance * lengthKm / 1000000;

            const I_C_A = 2 * Math.PI * frequency * C * voltage;

            const I_C_mA = I_C_A * 1000;

            const I_C_threePhase = I_C_mA * 3;

            const equipment = findBestEquipment(I_C_threePhase, selectedTransformer);

            let reactorBreakdownText = 'リアクトルなし';

            if (equipment.reactorCount > 0) {
                const parts = [];

                if (equipment.reactors.r1 > 0) {
                    parts.push(`1Kリアクトル ${equipment.reactors.r1}台`);
                }

                if (equipment.reactors.r2 > 0) {
                    parts.push(`2Kリアクトル ${equipment.reactors.r2}台`);
                }

                if (equipment.reactors.r5 > 0) {
                    parts.push(`5Kリアクトル ${equipment.reactors.r5}台`);
                }

                reactorBreakdownText = parts.join('、');
            }

            let reactorTable = '';

            if (
                equipment.reactors.r1 > 0 ||
                equipment.reactors.r2 > 0 ||
                equipment.reactors.r5 > 0
            ) {
                reactorTable += `
                    <div class="equipment-card reactor">
                        <div class="equipment-title">補償用リアクトル</div>
                        <div class="equipment-detail">
                            <table>
                                <tr>
                                    <th>種類</th>
                                    <th>容量</th>
                                    <th>台数</th>
                                    <th>合計</th>
                                </tr>
                `;

                if (equipment.reactors.r1 > 0) {
                    reactorTable += `
                        <tr>
                            <td>1Kリアクトル</td>
                            <td>128 mA</td>
                            <td>${equipment.reactors.r1}台</td>
                            <td>${equipment.reactors.r1 * 128} mA</td>
                        </tr>
                    `;
                }

                if (equipment.reactors.r2 > 0) {
                    reactorTable += `
                        <tr>
                            <td>2Kリアクトル</td>
                            <td>165 mA</td>
                            <td>${equipment.reactors.r2}台</td>
                            <td>${equipment.reactors.r2 * 165} mA</td>
                        </tr>
                    `;
                }

                if (equipment.reactors.r5 > 0) {
                    reactorTable += `
                        <tr>
                            <td>5Kリアクトル</td>
                            <td>412 mA</td>
                            <td>${equipment.reactors.r5}台</td>
                            <td>${equipment.reactors.r5 * 412} mA</td>
                        </tr>
                    `;
                }

                reactorTable += `
                            </table>
                            <div class="note">
                                リアクトル補償電流合計：${equipment.reactorTotal} mA
                            </div>
                        </div>
                    </div>
                `;
            }

            const formulaHTML = `
                <div class="formula-section">
                    <div class="formula-title">計算式代入</div>
                    <div class="formula-box">
                        <div class="formula-main">
                            Ic = 2π × ${frequency} × ${C.toExponential(6)} × ${voltage}
                        </div>
                        <div>
                            C = ${capacitance} μF/km × ${lengthKm.toFixed(3)} km ÷ 1,000,000<br>
                            C = ${C.toExponential(6)} F<br>
                            Ic = ${I_C_A.toFixed(6)} A = ${I_C_mA.toFixed(2)} mA / 相<br>
                            三相合計 = ${I_C_mA.toFixed(2)} × 3 = ${I_C_threePhase.toFixed(2)} mA
                        </div>
                    </div>
                </div>
            `;

            const resultHTML = `
                <div class="result-grid">
                    <div class="result-box">
                        <div class="result-label">充電電流 1相分</div>
                        <div class="result-value">${I_C_mA.toFixed(2)}</div>
                        <div class="unit">mA</div>
                    </div>

                    <div class="result-box highlight">
                        <div class="result-label">三相合計充電電流</div>
                        <div class="result-value">${I_C_threePhase.toFixed(2)}</div>
                        <div class="unit">mA</div>
                    </div>
                </div>

                <div class="unit-count-card">
                    <div class="unit-count-title">合計台数</div>
                    <div class="unit-count-main">${equipment.totalUnitCount}台</div>
                    <div class="unit-count-detail">
                        トランス：1台<br>
                        リアクトル：${equipment.reactorCount}台<br>
                        内訳：${equipment.transformer.name} 1台、${reactorBreakdownText}
                    </div>
                </div>

                <div class="equipment-section">
                    <div class="equipment-card">
                        <div class="equipment-title">必要耐圧トランス</div>
                        <div class="equipment-detail">
                            <table>
                                <tr>
                                    <th>選択トランス</th>
                                    <th>容量</th>
                                    <th>台数</th>
                                </tr>
                                <tr>
                                    <td>${equipment.transformer.name}</td>
                                    <td>${equipment.transformer.current} mA</td>
                                    <td>1台</td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    ${reactorTable}

                    <div class="equipment-card summary">
                        <div class="equipment-title">合計結果</div>
                        <div class="equipment-detail">
                            <table>
                                <tr>
                                    <th>項目</th>
                                    <th>値</th>
                                </tr>
                                <tr>
                                    <td>必要電流</td>
                                    <td>${I_C_threePhase.toFixed(2)} mA</td>
                                </tr>
                                <tr>
                                    <td>合計対応電流</td>
                                    <td>${equipment.totalCapacity} mA</td>
                                </tr>
                                <tr>
                                    <td>余裕電流</td>
                                    <td>${equipment.margin.toFixed(2)} mA</td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    ${formulaHTML}
                </div>
            `;

            document.getElementById('result').innerHTML = resultHTML;
        }

        /*
            B種接地線太さ計算
        */

        const groundingWireSizes = [
            {
                label: '2.6 mm',
                area: Math.PI * Math.pow(2.6, 2) / 4
            },
            {
                label: '3.2 mm',
                area: Math.PI * Math.pow(3.2, 2) / 4
            },
            {
                label: '14 mm²',
                area: 14
            },
            {
                label: '22 mm²',
                area: 22
            },
            {
                label: '38 mm²',
                area: 38
            },
            {
                label: '60 mm²',
                area: 60
            },
            {
                label: '100 mm²',
                area: 100
            },
            {
                label: '150 mm²',
                area: 150
            }
        ];

        const groundingCapacityTable = {
            class200: [
                { limitKva: 10, size: '2.6 mm' },
                { limitKva: 20, size: '3.2 mm' },
                { limitKva: 40, size: '14 mm²' },
                { limitKva: 75, size: '22 mm²' },
                { limitKva: 125, size: '38 mm²' },
                { limitKva: 150, size: '60 mm²' },
                { limitKva: 200, size: '60 mm²' },
                { limitKva: 350, size: '100 mm²' }
            ],
            class400500: [
                { limitKva: 20, size: '2.6 mm' },
                { limitKva: 40, size: '3.2 mm' },
                { limitKva: 75, size: '14 mm²' },
                { limitKva: 150, size: '22 mm²' },
                { limitKva: 250, size: '38 mm²' },
                { limitKva: 300, size: '60 mm²' },
                { limitKva: 400, size: '60 mm²' },
                { limitKva: 7000, size: '100 mm²' }
            ]
        };

        function getGroundingWireAreaByLabel(label) {
            const found = groundingWireSizes.find(item => item.label === label);
            return found ? found.area : null;
        }

        function selectGroundingWireByArea(requiredArea) {
            for (const size of groundingWireSizes) {
                if (size.area >= requiredArea) {
                    return size;
                }
            }

            return {
                label: '150 mm²超',
                area: requiredArea
            };
        }

        function getGroundingVoltageClass(voltage) {
            if (voltage <= 220) {
                return {
                    key: 'class200',
                    label: '200V級'
                };
            }

            if (voltage <= 550) {
                return {
                    key: 'class400500',
                    label: '400V級・500V級'
                };
            }

            return {
                key: null,
                label: '表対象外'
            };
        }

        function selectGroundingWireByCapacityTable(onePhaseCapacityKva, voltageClassKey) {
            if (!voltageClassKey || !groundingCapacityTable[voltageClassKey]) {
                return null;
            }

            const table = groundingCapacityTable[voltageClassKey];

            for (const row of table) {
                if (onePhaseCapacityKva <= row.limitKva) {
                    return {
                        limitKva: row.limitKva,
                        label: row.size,
                        area: getGroundingWireAreaByLabel(row.size)
                    };
                }
            }

            return null;
        }

        function calculateGroundingWire() {
            const phase = document.querySelector('input[name="groundingPhase"]:checked').value;
            const capacityKva = parseFloat(document.getElementById('groundingCapacity').value);
            const voltage = parseFloat(document.getElementById('groundingVoltage').value);
            const useRegulation = document.getElementById('useGroundingRegulation').checked;

            if (isNaN(capacityKva) || capacityKva <= 0) {
                alert('変圧器容量を正しく入力してください。');
                return;
            }

            if (isNaN(voltage) || voltage <= 0) {
                alert('二次側電圧を正しく入力してください。');
                return;
            }

            const coefficient = 0.052;
            const capacityVA = capacityKva * 1000;

            let ratedCurrent;
            let currentFormula;
            let currentFormulaSubstitution;
            let phaseText;

            if (phase === 'single') {
                ratedCurrent = capacityVA / voltage;
                currentFormula = 'In₁ = P₁ ÷ Vn';
                currentFormulaSubstitution = `In₁ = ${capacityKva} × 1000 ÷ ${voltage}`;
                phaseText = '単相・単相3線式';
            } else {
                ratedCurrent = capacityVA / (Math.sqrt(3) * voltage);
                currentFormula = 'In₃ = P₃ ÷ （√3 × Vn）';
                currentFormulaSubstitution = `In₃ = ${capacityKva} × 1000 ÷ （√3 × ${voltage}）`;
                phaseText = '三相3線式';
            }

            const requiredArea = ratedCurrent * coefficient;
            const calculatedSize = selectGroundingWireByArea(requiredArea);

            const voltageClass = getGroundingVoltageClass(voltage);

            const onePhaseCapacityKva = phase === 'three'
                ? capacityKva / 3
                : capacityKva;

            let tableSelectedSize = null;

            if (useRegulation) {
                tableSelectedSize = selectGroundingWireByCapacityTable(
                    onePhaseCapacityKva,
                    voltageClass.key
                );
            }

            let finalSize = calculatedSize;
            let adoptedReason = '計算式による直近上位サイズ';

            if (tableSelectedSize) {
                finalSize = tableSelectedSize;
                adoptedReason = '内線規程表による選定サイズ';
            }

            let tableJudgeHTML = '';

            if (tableSelectedSize) {
                tableJudgeHTML = `
                    <div class="equipment-card summary">
                        <div class="equipment-title">内線規程表による判定</div>
                        <div class="equipment-detail">
                            電圧区分：${voltageClass.label}<br>
                            変圧器一相分の容量：
                            ${
                                phase === 'three'
                                    ? `${capacityKva} kVA ÷ 3 = ${onePhaseCapacityKva.toFixed(1)} kVA`
                                    : `${onePhaseCapacityKva.toFixed(1)} kVA`
                            }<br>
                            表の直近上位：${tableSelectedSize.limitKva} kVAまで<br>
                            表による選定サイズ：<strong>${tableSelectedSize.label}</strong><br>
                            採用サイズ：<strong>${finalSize.label}</strong>
                        </div>
                    </div>
                `;
            } else if (useRegulation) {
                tableJudgeHTML = `
                    <div class="equipment-card warning">
                        <div class="equipment-title">内線規程表対象外</div>
                        <div class="equipment-detail">
                            入力条件は内線規程表の範囲外、または該当する表区分がありません。<br>
                            そのため、計算式による直近上位サイズ
                            <strong>${calculatedSize.label}</strong>
                            を採用します。
                        </div>
                    </div>
                `;
            } else {
                tableJudgeHTML = `
                    <div class="equipment-card warning">
                        <div class="equipment-title">内線規程表を使用しない設定</div>
                        <div class="equipment-detail">
                            内線規程表の適用がOFFのため、計算式による直近上位サイズ
                            <strong>${calculatedSize.label}</strong>
                            を採用します。
                        </div>
                    </div>
                `;
            }

            const resultHTML = `
                <div class="result-grid">
                    <div class="result-box">
                        <div class="result-label">定格電流</div>
                        <div class="result-value">${ratedCurrent.toFixed(1)}</div>
                        <div class="unit">A</div>
                    </div>

                    <div class="result-box">
                        <div class="result-label">必要断面積</div>
                        <div class="result-value">${requiredArea.toFixed(1)}</div>
                        <div class="unit">mm²</div>
                    </div>

                    <div class="result-box">
                        <div class="result-label">計算上の選定サイズ</div>
                        <div class="result-value">${calculatedSize.label}</div>
                    </div>

                    <div class="result-box">
                        <div class="result-label">表による選定サイズ</div>
                        <div class="result-value">${tableSelectedSize ? tableSelectedSize.label : '-'}</div>
                    </div>

                    <div class="result-box highlight">
                        <div class="result-label">採用サイズ</div>
                        <div class="result-value">${finalSize.label}</div>
                    </div>
                </div>

                <div class="equipment-section">
                    <div class="equipment-card">
                        <div class="equipment-title">計算条件</div>
                        <div class="equipment-detail">
                            <table>
                                <tr>
                                    <th>項目</th>
                                    <th>値</th>
                                </tr>
                                <tr>
                                    <td>相数</td>
                                    <td>${phaseText}</td>
                                </tr>
                                <tr>
                                    <td>変圧器容量</td>
                                    <td>${capacityKva} kVA</td>
                                </tr>
                                <tr>
                                    <td>二次側電圧</td>
                                    <td>${voltage} V</td>
                                </tr>
                                <tr>
                                    <td>電圧区分</td>
                                    <td>${voltageClass.label}</td>
                                </tr>
                                <tr>
                                    <td>変圧器一相分の容量</td>
                                    <td>${onePhaseCapacityKva.toFixed(1)} kVA</td>
                                </tr>
                                <tr>
                                    <td>係数</td>
                                    <td>${coefficient}</td>
                                </tr>
                                <tr>
                                    <td>採用理由</td>
                                    <td>${adoptedReason}</td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    ${tableJudgeHTML}

                    <div class="formula-section">
                        <div class="formula-title">計算式代入</div>
                        <div class="formula-box">
                            <div class="formula-main">${currentFormula}</div>
                            ${currentFormulaSubstitution}<br>
                            定格電流 = ${ratedCurrent.toFixed(1)} A<br><br>

                            A = 0.052 × 定格電流<br>
                            A = 0.052 × ${ratedCurrent.toFixed(1)}<br>
                            A = ${requiredArea.toFixed(1)} mm²<br><br>

                            計算式による直近上位：${requiredArea.toFixed(1)} mm² → ${calculatedSize.label}<br>
                            表による選定：${tableSelectedSize ? tableSelectedSize.label : '該当なし'}<br>
                            採用サイズ：${finalSize.label}
                        </div>
                    </div>

                    <div class="grounding-ref-section">
                        <h3>内線規程表：B種接地線の太さ</h3>
                        <table>
                            <tr>
                                <th>200V級</th>
                                <th>400V級・500V級</th>
                                <th>B種接地線の太さ</th>
                            </tr>
                            <tr>
                                <td>10 kVAまで</td>
                                <td>20 kVAまで</td>
                                <td>2.6 mm以上</td>
                            </tr>
                            <tr>
                                <td>20 kVAまで</td>
                                <td>40 kVAまで</td>
                                <td>3.2 mm以上</td>
                            </tr>
                            <tr>
                                <td>40 kVAまで</td>
                                <td>75 kVAまで</td>
                                <td>14 mm²以上</td>
                            </tr>
                            <tr>
                                <td>75 kVAまで</td>
                                <td>150 kVAまで</td>
                                <td>22 mm²以上</td>
                            </tr>
                            <tr>
                                <td>125 kVAまで</td>
                                <td>250 kVAまで</td>
                                <td>38 mm²以上</td>
                            </tr>
                            <tr>
                                <td>150 kVAまで</td>
                                <td>300 kVAまで</td>
                                <td>60 mm²以上</td>
                            </tr>
                            <tr>
                                <td>200 kVAまで</td>
                                <td>400 kVAまで</td>
                                <td>60 mm²以上</td>
                            </tr>
                            <tr>
                                <td>350 kVAまで</td>
                                <td>7000 kVAまで</td>
                                <td>100 mm²以上</td>
                            </tr>
                        </table>
                        <div class="note">
                            ※ 三相変圧器の場合は、定格容量の1/3を「変圧器一相分の容量」として表を参照します。<br>
                            ※ 表に該当する場合は、計算式による断面積より小さくても表のサイズを採用します。<br>
                            ※ 表対象外の場合は、計算式 A = 0.052 × 定格電流 による直近上位サイズを採用します。
                        </div>
                    </div>

                    <div class="grounding-ref-section">
                        <h3>使用可能な接地線サイズ</h3>
                        <table>
                            <tr>
                                <th>呼び</th>
                                <th>断面積</th>
                            </tr>
                            <tr>
                                <td>2.6 mm</td>
                                <td>${groundingWireSizes[0].area.toFixed(2)} mm²</td>
                            </tr>
                            <tr>
                                <td>3.2 mm</td>
                                <td>${groundingWireSizes[1].area.toFixed(2)} mm²</td>
                            </tr>
                            <tr>
                                <td>14 mm²</td>
                                <td>14 mm²</td>
                            </tr>
                            <tr>
                                <td>22 mm²</td>
                                <td>22 mm²</td>
                            </tr>
                            <tr>
                                <td>38 mm²</td>
                                <td>38 mm²</td>
                            </tr>
                            <tr>
                                <td>60 mm²</td>
                                <td>60 mm²</td>
                            </tr>
                            <tr>
                                <td>100 mm²</td>
                                <td>100 mm²</td>
                            </tr>
                            <tr>
                                <td>150 mm²</td>
                                <td>150 mm²</td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('groundingResult').innerHTML = resultHTML;
        }

        function resetGroundingWire() {
            document.querySelector('input[name="groundingPhase"][value="single"]').checked = true;
            document.getElementById('groundingCapacity').value = '500';
            document.getElementById('groundingVoltage').value = '200';
            document.getElementById('useGroundingRegulation').checked = true;
            document.getElementById('groundingResult').innerHTML = `
                <div class="result-placeholder">
                    入力条件を設定して「計算する」を押してください。
                </div>
            `;
        }
    </script>
</head>

<body>
    <div class="container">

        <div class="tab-nav">
            <button class="tab-button active" data-tab="tab1" onclick="showTab('tab1')">
                充電電流計算
            </button>
            <button class="tab-button" data-tab="tab2" onclick="showTab('tab2')">
                B種接地計算
            </button>
            <button class="tab-button" data-tab="tab3" onclick="showTab('tab3')">
                ページ3
            </button>
        </div>

        <div id="tab1" class="tab-content active">
            <div class="main-layout">
                <div class="card">
                    <h2>入力条件</h2>

                    <div class="form-group">
                        <label for="cableSize">ケーブルサイズ</label>
                        <select id="cableSize" onchange="updateCapacitance()">
                            <option value="">選択してください</option>
                            <option value="14sq">14 sq</option>
                            <option value="22sq">22 sq</option>
                            <option value="38sq">38 sq</option>
                            <option value="60sq">60 sq</option>
                            <option value="100sq">100 sq</option>
                            <option value="150sq">150 sq</option>
                            <option value="200sq">200 sq</option>
                            <option value="250sq">250 sq</option>
                            <option value="325sq">325 sq</option>
                            <option value="400sq">400 sq</option>
                            <option value="500sq">500 sq</option>
                            <option value="600sq">600 sq</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="capacitance">静電容量</label>
                        <input type="text" id="capacitance" readonly>
                        <div class="unit">μF/km</div>
                    </div>

                    <div class="form-group">
                        <label for="length">ケーブル長</label>
                        <input type="number" id="length" value="100" min="0">
                        <div class="unit">m</div>
                    </div>

                    <div class="form-group">
                        <label>電圧</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="voltage" value="6.6kV" checked>
                                <span>6.6 kV</span>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="voltage" value="3.3kV">
                                <span>3.3 kV</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="frequency">周波数</label>
                        <input type="number" id="frequency" value="50" min="0">
                        <div class="unit">Hz</div>
                    </div>

                    <div class="form-group">
                        <label>耐圧トランス選択</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="transformer" value="2K" checked>
                                <span>2Kトランス</span>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="transformer" value="5K">
                                <span>5Kトランス</span>
                            </label>
                        </div>
                        <div class="note">
                            初期値は2Kトランスです。必要に応じて5Kトランスへ変更できます。
                        </div>
                    </div>

                    <button class="calc-button" onclick="calculateChargingCurrent()">計算する</button>
                </div>

                <div class="card">
                    <h2>計算結果</h2>

                    <div id="result">
                        <div class="result-placeholder">
                            入力条件を設定して「計算する」を押してください。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="main-layout">
                <div class="card">
                    <h2>B種接地線 太さ計算</h2>

                    <div class="form-group">
                        <label>相数</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="groundingPhase" value="single" checked>
                                <span>単相</span>
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="groundingPhase" value="three">
                                <span>三相</span>
                            </label>
                        </div>
                        <div class="note">
                            単相3線式100/200Vは「単相」、三相3線式200Vは「三相」を選択してください。
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="groundingCapacity">変圧器容量</label>
                        <input type="number" id="groundingCapacity" value="500" min="0" step="1">
                        <div class="unit">kVA</div>
                    </div>

                    <div class="form-group">
                        <label for="groundingVoltage">二次側電圧</label>
                        <input type="number" id="groundingVoltage" value="200" min="0" step="1">
                        <div class="unit">V</div>
                    </div>

                    <div class="form-group">
                        <label>内線規程表</label>
                        <label class="checkbox-row">
                            <input type="checkbox" id="useGroundingRegulation" checked>
                            <span>内線規程表による選定を適用する</span>
                        </label>
                        <div class="note">
                            表に該当する場合は、表によるサイズを採用します。
                        </div>
                    </div>

                    <button class="calc-button" onclick="calculateGroundingWire()">計算する</button>

                    <div style="height: 10px;"></div>

                    <button class="calc-button" style="background:#6b7280;" onclick="resetGroundingWire()">リセット</button>

                    <div class="note">
                        計算式：A = 0.052 × 定格電流<br>
                        単相：In₁ = P₁ ÷ Vn<br>
                        三相：In₃ = P₃ ÷ （√3 × Vn）
                    </div>
                </div>

                <div class="card">
                    <h2>計算結果</h2>

                    <div id="groundingResult">
                        <div class="result-placeholder">
                            入力条件を設定して「計算する」を押してください。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="blank-page"></div>
        </div>

    </div>
</body>
</html>
